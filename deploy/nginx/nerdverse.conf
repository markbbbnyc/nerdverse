# Nerdverse public terminal — nginx site config
# Install: deploy/install-server.sh copies to /etc/nginx/sites-available/nerdverse

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/nerdverse-public/deploy/web;
    index nerdverse.html;

    # Landing page
    location = / {
        try_files /nerdverse.html =404;
    }

    location /static/ {
        alias /opt/nerdverse-public/deploy/web/static/;
    }

    # ttyd WebSocket terminal (sandboxed game cage)
    location /play/ {
        proxy_pass http://127.0.0.1:7681/play/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        set $connection_upgrade "";
        if ($http_upgrade != "") {
            set $connection_upgrade upgrade;
        }
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /health {
        access_log off;
        return 200 "nerdverse-ok\n";
        add_header Content-Type text/plain;
    }

    # Author analytics dashboard (basic auth — credentials set by install-server.sh)
    location = /admin/stats.json {
        auth_basic "Nerdverse Analytics";
        auth_basic_user_file /etc/nginx/.htpasswd-nerdverse-admin;
        alias /var/lib/nerdverse/telemetry/stats.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location /admin/ {
        auth_basic "Nerdverse Analytics";
        auth_basic_user_file /etc/nginx/.htpasswd-nerdverse-admin;
        alias /opt/nerdverse-public/deploy/web/admin/;
        index index.html;
    }
}