# Nerdverse public terminal — nginx site config
# Install: deploy/install-server.sh copies to /etc/nginx/sites-available/nerdverse

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/nerdverse-public/deploy/web;
    index nerdverse.html;

    # Landing page
    location = / {
        try_files /nerdverse.html =404;
    }

    location /static/ {
        alias /opt/nerdverse-public/deploy/web/static/;
    }

    # ttyd WebSocket terminal (sandboxed game cage)
    location /play/ {
        proxy_pass http://127.0.0.1:7681/play/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /health {
        access_log off;
        return 200 "nerdverse-ok\n";
        add_header Content-Type text/plain;
    }
}